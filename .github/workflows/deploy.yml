name: Deploy TalentRadar

on:
  # Manual trigger ONLY - Click "Run workflow" button in GitHub Actions
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

env:
  NODE_VERSION: '20'
  # GCP Configuration - Update these values
  GCP_PROJECT_ID: 'alpine-avatar-246411' # TODO: Update with your GCP project ID
  GCP_REGION: 'us-central1'
  GCP_BACKEND_SERVICE: 'talentradar-backend'
  GCP_FRONTEND_SERVICE: 'talentradar-frontend'

jobs:
  # ==========================================
  # Build All Packages with Turborepo
  # ==========================================
  build:
    name: Build & Test (Turborepo)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Setup Turbo Cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Install dependencies
        run: npm install

      - name: Build all packages with Remote Cache
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL || 'https://placeholder-api.com/api/v1' }}
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

      - name: Run tests
        run: npm run test --if-present
        continue-on-error: true
        env:
          CI: true

      - name: Archive backend build
        uses: actions/upload-artifact@v4
        with:
          name: backend-dist
          path: apps/server/dist
          retention-days: 1

      - name: Archive frontend build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: apps/client/dist
          retention-days: 1

  # ==========================================
  # Deploy Backend to GCP Cloud Run
  # ==========================================
  deploy-backend:
    name: Deploy Backend to GCP Cloud Run
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'workflow_dispatch'

    permissions:
      contents: 'read'
      id-token: 'write'

    outputs:
      url: ${{ steps.get-url.outputs.url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev

      - name: Build and Push Docker image
        run: |
          IMAGE_NAME="${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/talentradar-backend/backend:${{ github.sha }}"
          # Build from repo root for turbo prune to work
          docker build -f apps/server/Dockerfile -t "${IMAGE_NAME}" .
          docker push "${IMAGE_NAME}"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.GCP_BACKEND_SERVICE }} \
            --image ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/talentradar-backend/backend:${{ github.sha }} \
            --platform managed \
            --region ${{ env.GCP_REGION }} \
            --allow-unauthenticated \
            --port 5000 \
            --memory 512Mi \
            --timeout 60s \
            --max-instances 10

      - name: Get Backend URL
        id: get-url
        run: |
          BACKEND_URL=$(gcloud run services describe ${{ env.GCP_BACKEND_SERVICE }} \
            --region ${{ env.GCP_REGION }} \
            --format="value(status.url)")
          echo "Backend deployed to: ${BACKEND_URL}"
          echo "url=${BACKEND_URL}" >> $GITHUB_OUTPUT

  # ==========================================
  # Deploy Frontend to GCP Cloud Run
  # ==========================================
  deploy-frontend:
    name: Deploy Frontend to GCP Cloud Run
    runs-on: ubuntu-latest
    needs: [build, deploy-backend]
    if: github.event_name == 'workflow_dispatch'

    permissions:
      contents: 'read'
      id-token: 'write'

    outputs:
      url: ${{ steps.get-url.outputs.url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev

      - name: Build and Push Docker image
        run: |
          # Get backend URL from previous job
          BACKEND_URL="${{ needs.deploy-backend.outputs.url }}"

          # Build with backend URL as build arg from repo root
          IMAGE_NAME="${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/talentradar-frontend/frontend:${{ github.sha }}"
          docker build \
            -f apps/client/Dockerfile \
            --build-arg VITE_API_URL="${BACKEND_URL}/api/v1" \
            -t "${IMAGE_NAME}" .
          docker push "${IMAGE_NAME}"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.GCP_FRONTEND_SERVICE }} \
            --image ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/talentradar-frontend/frontend:${{ github.sha }} \
            --platform managed \
            --region ${{ env.GCP_REGION }} \
            --allow-unauthenticated \
            --port 8080 \
            --memory 256Mi \
            --timeout 30s \
            --max-instances 5

      - name: Get Frontend URL
        id: get-url
        run: |
          FRONTEND_URL=$(gcloud run services describe ${{ env.GCP_FRONTEND_SERVICE }} \
            --region ${{ env.GCP_REGION }} \
            --format="value(status.url)")
          echo "Frontend deployed to: ${FRONTEND_URL}"
          echo "url=${FRONTEND_URL}" >> $GITHUB_OUTPUT

  # ==========================================
  # Update Backend CORS with Frontend URL
  # ==========================================
  update-cors:
    name: Update Backend CORS
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-frontend]
    if: github.event_name == 'workflow_dispatch'

    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Update CORS Origin
        run: |
          FRONTEND_URL="${{ needs.deploy-frontend.outputs.url }}"
          echo "Updating CORS_ORIGIN to: ${FRONTEND_URL}"

          gcloud run services update ${{ env.GCP_BACKEND_SERVICE }} \
            --region ${{ env.GCP_REGION }} \
            --update-env-vars="CORS_ORIGIN=${FRONTEND_URL}"

  # ==========================================
  # Notify Deployment Status
  # ==========================================
  notify:
    name: Notify Deployment Status
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-frontend, update-cors]
    if: always() && github.event_name == 'workflow_dispatch'

    steps:
      - name: Check deployment status
        run: |
          if [ "${{ needs.deploy-backend.result }}" = "success" ] && [ "${{ needs.deploy-frontend.result }}" = "success" ]; then
            echo "🎉 Deployment successful!"
            echo ""
            echo "✅ Backend: ${{ needs.deploy-backend.outputs.url }}"
            echo "✅ Frontend: ${{ needs.deploy-frontend.outputs.url }}"
            echo ""
            echo "Both services deployed to GCP Cloud Run!"
          else
            echo "❌ Deployment failed. Check logs for details."
            echo "Backend status: ${{ needs.deploy-backend.result }}"
            echo "Frontend status: ${{ needs.deploy-frontend.result }}"
            exit 1
          fi
